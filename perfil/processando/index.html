<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Processando | Stop mod</title><link rel="icon" href="../../favicon.svg" type="image/svg+xml" /><link rel="stylesheet" href="../../style.css" /></head>
<body><main class="page-shell container"><section class="page-card"><p class="eyebrow">Pedidos</p><h1>Pedidos em processamento</h1><div id="processing-list" class="page-stack"></div></section></main><script>const ORDERS_KEY="stopmod_orders"; const container=document.getElementById("processing-list"); let orders=[]; try { orders=JSON.parse(localStorage.getItem(ORDERS_KEY) || "[]"); } catch {} const filtered = orders.filter((order)=>/Aguardando|Processando/i.test(String(order.status || ""))); container.innerHTML = filtered.length ? filtered.map((order)=>`<article class="helper-card"><h3>${order.id || "Pedido"}</h3><p>Status: ${order.status || "Processando"}</p></article>`).join("") : "<p>Nenhum pedido em processamento no momento.</p>";</script></body></html>
