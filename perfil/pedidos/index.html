<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Pedidos | Stop mod</title><link rel="icon" href="../../favicon.svg" type="image/svg+xml" /><link rel="stylesheet" href="../../style.css" /></head>
<body><main class="page-shell container"><section class="page-card"><p class="eyebrow">Pedidos</p><h1>Historico de pedidos</h1><div id="orders-list" class="page-stack"></div><div class="page-actions"><a class="btn secondary" href="../../carrinho/">Abrir carrinho</a></div></section></main><script>const ORDERS_KEY="stopmod_orders"; const container=document.getElementById("orders-list"); let orders=[]; try { orders=JSON.parse(localStorage.getItem(ORDERS_KEY) || "[]"); } catch {} container.innerHTML = orders.length ? orders.map((order)=>`<article class="helper-card"><h3>${order.id || "Pedido"}</h3><p>Status: ${order.status || "Em andamento"}</p><p>Total: R$ ${Number(order.total || 0).toFixed(2).replace(".", ",")}</p></article>`).join("") : "<p>Nenhum pedido encontrado ainda.</p>";</script></body></html>
