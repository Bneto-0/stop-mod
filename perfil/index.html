<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Minha conta | Stop mod</title><link rel="icon" href="../favicon.svg" type="image/svg+xml" /><link rel="stylesheet" href="../style.css" /></head>
<body><main class="page-shell container"><section class="page-card"><p class="eyebrow">Conta</p><h1 id="profile-name">Minha conta</h1><p id="profile-text">Entre ou cadastre-se para salvar endereco, acompanhar pedidos e finalizar compras.</p><div class="page-actions"><a class="btn primary" href="../login/">Entrar</a><a class="btn secondary" href="./pedidos/">Meus pedidos</a><a class="btn secondary" href="../entrega/">Enderecos</a></div></section></main><script>const profileName=document.getElementById("profile-name"); const profileText=document.getElementById("profile-text"); try { const profile=JSON.parse(localStorage.getItem("stopmod_profile") || "null"); if (profile && profile.name) { profileName.textContent = profile.name.split(/\s+/)[0]; profileText.textContent = `Conta ativa para ${profile.email || "cliente"}.`; } } catch {}</script></body></html>
